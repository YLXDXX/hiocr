<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <!-- 核心库 -->
    <script src="qrc:/resources/marked.min.js"></script>
    <script src="qrc:/resources/temml/temml.min.js"></script>

    <!-- Temml 扩展支持 (化学、物理、texvc) -->
    <script src="qrc:/resources/temml/mhchem.min.js"></script>
    <script src="qrc:/resources/temml/physics.js"></script>
    <script src="qrc:/resources/temml/texvc.js"></script>

    <!-- 代码高亮 -->
    <script src="qrc:/resources/highlight/highlight.min.js"></script>
    <link rel="stylesheet" href="qrc:/resources/highlight/atom-one-dark.min.css">

    <!-- 默认数学字体 -->
    <link rel="stylesheet" href="qrc:/resources/temml/Temml-Latin-Modern.css">

    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <style>
        /* === 基础布局 === */
        html, body {
            height: 100%; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 16px; line-height: 1.6; color: #24292e;
            background-color: #fff; overflow-y: auto;
            word-wrap: break-word;
        }

        #content {
            width: 90%; max-width: 850px; margin: 20px auto;
            padding: 20px; padding-top: 50px;
            box-sizing: border-box;
        }

        /* === 顶部工具栏 === */
        #toolbar {
            position: fixed;
            top: 10px;
            right: 15px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            padding: 5px 10px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #e1e4e8;
        }
        #toolbar label { font-weight: 500; color: #555; }
        #toolbar select {
            border: 1px solid #d1d5da;
            border-radius: 4px;
            padding: 4px 8px;
            background-color: #fff;
            cursor: pointer;
        }

        /* === Markdown 样式 === */
        #content h1, #content h2, #content h3 { margin-top: 24px; margin-bottom: 16px; font-weight: 600; }
        #content h1 { font-size: 2em; border-bottom: 1px solid #eaecef; padding-bottom: .3em; }
        #content h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: .3em; }
        #content a { color: #0366d6; text-decoration: none; }
        #content a:hover { text-decoration: underline; }

        /* 代码块 */
        #content pre { padding: 16px; overflow: auto; font-size: 85%; background-color: #f6f8fa; border-radius: 6px; }
        #content code { padding: 0.2em 0.4em; margin: 0; font-size: 85%; background-color: rgba(27,31,35,0.05); border-radius: 3px; font-family: monospace; }
        #content pre code { padding: 0; background-color: transparent; }

        /* 表格 */
        #content table { border-spacing: 0; border-collapse: collapse; margin-bottom: 16px; width: 100%; display: block; overflow-x: auto; }
        #content table th, #content table td { padding: 6px 13px; border: 1px solid #dfe2e5; }
        #content table th { font-weight: 600; background-color: #f6f8fa; }
        #content table tr { background-color: #fff; border-top: 1px solid #c6cbd1; }
        #content table tr:nth-child(2n) { background-color: #f6f8fa; }

        #content img { max-width: 100%; }
        .error { color: #d9534f; background: #f9f2f4; padding: 15px; border-radius: 4px; margin-bottom: 20px; border-left: 4px solid #d9534f; }
    </style>
</head>
<body>

    <div id="toolbar">
        <label for="MathFont">Math Font:</label>
        <select id="MathFont" onchange="updateMathFont()">
            <option value="Latin-Modern">Latin Modern</option>
            <option value="Asana">Asana</option>
            <option value="STIX2">STIX Two</option>
            <option value="Libertinus">Libertinus</option>
            <option value="NotoSans">Noto Sans</option>
            <option value="Local">Local</option>
        </select>
    </div>

    <div id="content"></div>

    <script>
        (function() {
            // 1. Marked 配置
            marked.setOptions({
                gfm: true,
                breaks: true,
                highlight: function(code, lang) {
                    if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
                        try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
                    }
                    return code;
                }
            });

            // 2. 数学公式 tokenizer (提取为独立函数，彻底解决作用域问题)
            function mathTokenizer(src) {
                var match;

                // 匹配块级公式 $$...$$                 match = src.match(/^\$\$\s*([\s\S]+?)\s*\$\$/);
                if (match) {
                    return { type: 'math', raw: match[0], text: match[0], display: true };
                }

                // 匹配行内公式 $...$                 // 支持 \right\{ 等复杂转义，支持 physics.js 和 mhchem 的语法
                match = src.match(/^\$((?:[^\$]|\\\$)+?)\$/);
                if (match) {
                    return { type: 'math', raw: match[0], text: match[0], display: false };
                }

                return undefined;
            }

            // 3. 注册扩展
            const mathExtension = {
                name: 'math',
                level: 'inline',
                start(src) { return src.indexOf('$'); },
                tokenizer: mathTokenizer, // 引用外部函数
                renderer(token) { return token.text; }
            };

            marked.use({ extensions: [mathExtension] });

            // 4. 字体切换功能
            window.updateMathFont = function() {
                const fontName = document.getElementById("MathFont").value;
                const temmlRegEx = /Temml-.+\.css$/;
                const links = [...document.head.getElementsByTagName('link')];

                links.forEach(link => {
                    if (temmlRegEx.test(link.href)) {
                        link.setAttribute("href", `qrc:/resources/temml/Temml-${fontName}.css`);
                    }
                });
            }

            // 5. 渲染函数
            function renderMarkdown(markdown) {
                const contentDiv = document.getElementById('content');
                const oldScrollTop = document.documentElement.scrollTop || document.body.scrollTop;

                if (!markdown) { contentDiv.innerHTML = ''; return; }

                try {
                    contentDiv.innerHTML = marked.parse(markdown);

                    if (typeof temml !== 'undefined') {
                        temml.renderMathInElement(contentDiv, {
                            delimiters: [
                                { left: '$$', right: '$$', display: true },
                                { left: '$', right: '$', display: false },
                                { left: '\\(', right: '\\)', display: false },
                                { left: '\\[', right: '\\]', display: true }
                            ],
                            trust: true,
                            macros: {}
                        });
                    }

                } catch (e) {
                    console.error('Render Error:', e);
                    const errorMsg = document.createElement('div');
                    errorMsg.className = 'error';
                    errorMsg.innerHTML = 'Render Error: ' + e.message;
                    contentDiv.prepend(errorMsg);
                }

                window.scrollTo(0, oldScrollTop);
            }

            // 6. Qt WebChannel
            new QWebChannel(qt.webChannelTransport, function(channel) {
                window.bridge = channel.objects.bridge;
                if (bridge.markdown) {
                    renderMarkdown(bridge.markdown);
                }
                bridge.markdownChanged.connect(renderMarkdown);
            });
        })();
    </script>
</body>
</html>
