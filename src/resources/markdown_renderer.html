<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="qrc:/resources/marked.min.js"></script>
    <script src="qrc:/resources/temml/temml.min.js"></script>
    <script src="qrc:/resources/temml/mhchem.min.js"></script>
    <script src="qrc:/resources/temml/physics.js"></script>
    <script src="qrc:/resources/temml/texvc.js"></script>
    <script src="qrc:/resources/temml/PhyUnit.js"></script>
    <link rel="stylesheet" href="qrc:/resources/temml/Temml-Latin-Modern.css" id="math-font-css">
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <style>
        html, body {
            height: 100%; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 18px; line-height: 1.6; color: #24292e;
            background-color: #fff; overflow-y: auto;
            word-wrap: break-word;
        }

        #content {
            width: 90%; max-width: 850px; margin: 20px auto;
            padding: 20px; box-sizing: border-box;
        }

        #content h1, #content h2, #content h3 { margin-top: 24px; margin-bottom: 16px; font-weight: 600; }
        #content h1 { font-size: 2em; border-bottom: 1px solid #eaecef; padding-bottom: .3em; }
        #content h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: .3em; }
        #content a { color: #0366d6; text-decoration: none; }
        #content a:hover { text-decoration: underline; }

        #content pre { padding: 16px; overflow: auto; font-size: 85%; background-color: #f6f8fa; border-radius: 6px; }
        #content code { padding: 0.2em 0.4em; margin: 0; font-size: 85%; background-color: rgba(27,31,35,0.05); border-radius: 3px; font-family: monospace; }
        #content pre code { padding: 0; background-color: transparent; }

        #content table { border-spacing: 0; border-collapse: collapse; margin-bottom: 16px; width: 100%; display: block; overflow-x: auto; }
        #content table th, #content table td { padding: 6px 13px; border: 1px solid #dfe2e5; }
        #content table th { font-weight: 600; background-color: #f6f8fa; }
        #content table tr { background-color: #fff; border-top: 1px solid #c6cbd1; }
        #content table tr:nth-child(2n) { background-color: #f6f8fa; }

        #content img { max-width: 100%; }
        .error { color: #d9534f; background: #f9f2f4; padding: 15px; border-radius: 4px; margin-bottom: 20px; border-left: 4px solid #d9534f; }

        /* === Chandra HTML 样式 === */
        #content.chandra-mode div[data-label] { margin: 0.5em 0; padding: 0; }
        #content.chandra-mode div[data-label="Text"] p { margin: 0.4em 0; }
        #content.chandra-mode div[data-label="Equation-Block"] { text-align: center; margin: 1em 0; overflow-x: auto; }
        #content.chandra-mode div[data-label="Equation-Inline"] { display: inline; }
        #content.chandra-mode div[data-label="Table"] { margin: 1em 0; }
        #content.chandra-mode div[data-label="Image"],
        #content.chandra-mode div[data-label="Figure"] { text-align: center; margin: 1em 0; }
        #content.chandra-mode div[data-label="Page-Header"],
        #content.chandra-mode div[data-label="Page-Footer"] { color: #888; font-size: 0.9em; }
        #content.chandra-mode div[data-label="Blank-Page"] { display: none; }

        .chandra-math-inline { display: inline; }
        .chandra-math-block { display: block; text-align: center; margin: 1em 0; overflow-x: auto; }
        .chandra-math-error { color: #d9534f; background: #f9f2f4; padding: 2px 4px; border-radius: 3px; font-family: monospace; font-size: 0.85em; }
    </style>
</head>
<body>
    <div id="content"></div>

    <script>
    (function() {
        marked.setOptions({ gfm: true, breaks: true });

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // === Marked 公式扩展 ===
        const blockMathExtension = {
            name: 'blockMath', level: 'block',
            start(src) { const m = src.match(/^ {0,3}\$\$/m); return m ? m.index : -1; },
            tokenizer(src) {
                const match = /^ {0,3}\$\$([\s\S]+?)\$\$(?:\n+|$)/.exec(src);
                if (match) return { type: 'blockMath', raw: match[0], text: match[0], display: true };
                return false;
            },
            renderer(token) { return escapeHtml(token.text); }
        };
        const inlineMathExtension = {
            name: 'inlineMath', level: 'inline',
            start(src) { return src.indexOf('$'); },
            tokenizer(src) {
                const match = /^\$((?:[^\$]|\\\$)+?)\$/.exec(src);
                if (match) return { type: 'inlineMath', raw: match[0], text: match[0], display: false };
                return false;
            },
            renderer(token) { return escapeHtml(token.text); }
        };
        const blockMathBracketExtension = {
            name: 'blockMathBracket', level: 'block',
            start(src) { const m = src.match(/^ {0,3}\\\[/m); return m ? m.index : -1; },
            tokenizer(src) {
                const match = /^ {0,3}\\\[[\s\S]+?\\\](?:\n+|$)/.exec(src);
                if (match) return { type: 'blockMathBracket', raw: match[0], text: match[0], display: true };
                return false;
            },
            renderer(token) { return escapeHtml(token.text); }
        };
        const inlineMathParenExtension = {
            name: 'inlineMathParen', level: 'inline',
            start(src) { return src.indexOf('\\('); },
            tokenizer(src) {
                const match = /^\\\(([\s\S]+?)\\\)/.exec(src);
                if (match) return { type: 'inlineMathParen', raw: match[0], text: match[0], display: false };
                return false;
            },
            renderer(token) { return escapeHtml(token.text); }
        };

        marked.use({ extensions: [blockMathExtension, inlineMathExtension, blockMathBracketExtension, inlineMathParenExtension] });

        // 字体切换
        function updateMathFont(fontName) {
            var link = document.getElementById('math-font-css');
            if (!link) return;
            var newHref = 'qrc:/resources/temml/Temml-' + fontName + '.css';
            if (link.getAttribute('href') !== newHref) link.setAttribute('href', newHref);
        }

        // =============================================
        // 服务名称 → 渲染模式判定
        // =============================================

        function isChandraMode() {
            return bridge && bridge.serviceName &&
                   bridge.serviceName.toLowerCase().indexOf('chandra') !== -1;
        }

        // =============================================
        // Chandra HTML 渲染
        // =============================================

        // Temml 渲染配置（<math> 标签路径和 $...$ 路径共用）
        var temmlRenderOptions = {
            trust: true
        };

        var temmlAutoOptions = {
            delimiters: [
                { left: '$$', right: '$$', display: true },
                { left: '$', right: '$', display: false },
                { left: '\\(', right: '\\)', display: false },
                { left: '\\[', right: '\\]', display: true }
            ],
            // 【关键】跳过已渲染的元素，防止重复处理
            ignoredClasses: ['chandra-math-block', 'chandra-math-inline', 'chandra-math-error'],
            trust: true
        };

        function renderChandraHtml(html) {
            var contentDiv = document.getElementById('content');
            contentDiv.className = 'chandra-mode';

            try {
                // 第一步：注入原始 HTML
                contentDiv.innerHTML = html;

                // 第二步：清理不需要的属性和元素
                var bboxDivs = contentDiv.querySelectorAll('[data-bbox]');
                for (var i = 0; i < bboxDivs.length; i++) {
                    bboxDivs[i].removeAttribute('data-bbox');
                }

                var blankDivs = contentDiv.querySelectorAll('div[data-label="Blank-Page"]');
                for (var i = 0; i < blankDivs.length; i++) {
                    blankDivs[i].style.display = 'none';
                }

                // 第三步：处理 <math> 标签（Chandra 标准格式）
                if (typeof temml !== 'undefined') {
                    var mathElements = contentDiv.querySelectorAll('math');
                    for (var i = 0; i < mathElements.length; i++) {
                        var mathEl = mathElements[i];
                        var latex = mathEl.textContent || mathEl.innerText || '';
                        var isBlock = mathEl.hasAttribute('display') &&
                                      mathEl.getAttribute('display') === 'block';

                        if (typeof temml.preprocessLatexUnits === 'function') {
                            try { latex = temml.preprocessLatexUnits(latex); }
                            catch(e) { console.warn('PhyUnit preprocess error:', e); }
                        }

                        try {
                            var renderedHtml = temml.renderToString(latex, {
                                displayMode: isBlock,
                                trust: true
                            });
                            var wrapper = document.createElement(isBlock ? 'div' : 'span');
                            wrapper.innerHTML = renderedHtml;
                            wrapper.className = isBlock ? 'chandra-math-block' : 'chandra-math-inline';
                            mathEl.parentNode.replaceChild(wrapper, mathEl);
                        } catch (e) {
                            console.warn('Temml <math> render error:', e.message, 'LaTeX:', latex);
                            var errorSpan = document.createElement('span');
                            errorSpan.className = 'chandra-math-error';
                            errorSpan.textContent = latex;
                            mathEl.parentNode.replaceChild(errorSpan, mathEl);
                        }
                    }

                    // 第四步【新增】：处理残留的 $...$ / $$...$$ 定界符
                    // Chandra 有时会在 HTML 中混合使用 <math> 和 $...$ 两种格式
                    // ignoredClasses 确保第三步已渲染的元素不会被重复处理
                    try {
                        temml.renderMathInElement(contentDiv, temmlAutoOptions);
                    } catch (e) {
                        console.warn('Temml auto-render error in Chandra mode:', e.message);
                    }
                }
            } catch (e) {
                console.error('Chandra HTML Render Error:', e);
                var errorMsg = document.createElement('div');
                errorMsg.className = 'error';
                errorMsg.innerHTML = 'Chandra HTML Render Error: ' + e.message;
                contentDiv.prepend(errorMsg);
            }
        }

        // =============================================
        // 统一渲染入口
        // =============================================

        function renderMarkdown(markdown) {
            var contentDiv = document.getElementById('content');
            var oldScrollTop = document.documentElement.scrollTop || document.body.scrollTop;

            if (!markdown) {
                contentDiv.innerHTML = '';
                contentDiv.className = '';
                return;
            }

            // 【关键分支】根据服务名称判断是否走 Chandra 渲染路径
            if (isChandraMode() && markdown.indexOf('<math') !== -1) {
                renderChandraHtml(markdown);
                window.scrollTo(0, oldScrollTop);
                return;
            }

            // 标准 Markdown 渲染路径
            contentDiv.className = '';

            try {
                if (typeof temml !== 'undefined' && typeof temml.preprocessLatexUnits === 'function') {
                    markdown = temml.preprocessLatexUnits(markdown);
                }

                contentDiv.innerHTML = marked.parse(markdown);

                if (typeof temml !== 'undefined') {
                    temml.renderMathInElement(contentDiv, temmlAutoOptions);
                }
            } catch (e) {
                console.error('Render Error:', e);
                var errorMsg = document.createElement('div');
                errorMsg.className = 'error';
                errorMsg.innerHTML = 'Render Error: ' + e.message;
                contentDiv.prepend(errorMsg);
            }
            window.scrollTo(0, oldScrollTop);
        }

        // WebChannel 初始化
        new QWebChannel(qt.webChannelTransport, function(channel) {
            window.bridge = channel.objects.bridge;
            bridge.markdownChanged.connect(renderMarkdown);
            bridge.mathFontChanged.connect(updateMathFont);

            bridge.serviceNameChanged.connect(function() {
                if (bridge.markdown) { renderMarkdown(bridge.markdown); }
            });

            if (bridge.markdown) { renderMarkdown(bridge.markdown); }
            if (bridge.mathFont) { updateMathFont(bridge.mathFont); }
        });
    })();
    </script>
</body>
</html>
