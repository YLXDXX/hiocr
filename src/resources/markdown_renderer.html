<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <!-- 核心库 -->
    <script src="qrc:/resources/marked.min.js"></script>
    <script src="qrc:/resources/temml/temml.min.js"></script>

    <!-- Temml 扩展支持 -->
    <script src="qrc:/resources/temml/mhchem.min.js"></script>
    <script src="qrc:/resources/temml/physics.js"></script>
    <script src="qrc:/resources/temml/texvc.js"></script>

    <!-- 代码高亮 -->
    <script src="qrc:/resources/highlight/highlight.min.js"></script>
    <link rel="stylesheet" href="qrc:/resources/highlight/atom-one-dark.min.css">

    <!-- 默认数学字体 -->
    <link rel="stylesheet" href="qrc:/resources/temml/Temml-Latin-Modern.css" id="math-font-css">

    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <style>
        /* === 基础布局 === */
        html, body {
            height: 100%; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 18px; line-height: 1.6; color: #24292e;
            background-color: #fff; overflow-y: auto;
            word-wrap: break-word;
        }

        #content {
            width: 90%; max-width: 850px; margin: 20px auto;
            padding: 20px;
            box-sizing: border-box;
        }

        /* === Markdown 样式 === */
        #content h1, #content h2, #content h3 { margin-top: 24px; margin-bottom: 16px; font-weight: 600; }
        #content h1 { font-size: 2em; border-bottom: 1px solid #eaecef; padding-bottom: .3em; }
        #content h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: .3em; }
        #content a { color: #0366d6; text-decoration: none; }
        #content a:hover { text-decoration: underline; }

        /* 代码块 */
        #content pre { padding: 16px; overflow: auto; font-size: 85%; background-color: #f6f8fa; border-radius: 6px; }
        #content code { padding: 0.2em 0.4em; margin: 0; font-size: 85%; background-color: rgba(27,31,35,0.05); border-radius: 3px; font-family: monospace; }
        #content pre code { padding: 0; background-color: transparent; }

        /* 表格 */
        #content table { border-spacing: 0; border-collapse: collapse; margin-bottom: 16px; width: 100%; display: block; overflow-x: auto; }
        #content table th, #content table td { padding: 6px 13px; border: 1px solid #dfe2e5; }
        #content table th { font-weight: 600; background-color: #f6f8fa; }
        #content table tr { background-color: #fff; border-top: 1px solid #c6cbd1; }
        #content table tr:nth-child(2n) { background-color: #f6f8fa; }

        #content img { max-width: 100%; }
        .error { color: #d9534f; background: #f9f2f4; padding: 15px; border-radius: 4px; margin-bottom: 20px; border-left: 4px solid #d9534f; }
    </style>
</head>
<body>
    <div id="content"></div>

    <script>
        (function() {
            // 1. Marked 配置
            marked.setOptions({
                gfm: true,
                breaks: true,
                highlight: function(code, lang) {
                    if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
                        try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
                    }
                    return code;
                }
            });

            // 2. 公式扩展定义

            // 块级公式扩展 (处理 $$...$$)
            const blockMathExtension = {
                name: 'blockMath',
                level: 'block',
                start(src) {
                    const match = src.match(/^ {0,3}\$\$/m);
                    return match ? match.index : -1;
                },
                tokenizer(src, tokens) {
                    const rule = /^ {0,3}\$\$([\s\S]+?)\$\$(?:\n+|$)/;
                    const match = rule.exec(src);
                    if (match) {
                        return {
                            type: 'blockMath',
                            raw: match[0],
                            text: match[0],
                            display: true
                        };
                    }
                    return false;
                },
                renderer(token) {
                    return token.text;
                }
            };

            // 行内公式扩展 (处理 $...$)
            const inlineMathExtension = {
                name: 'inlineMath',
                level: 'inline',
                start(src) { return src.indexOf('$'); },
                tokenizer(src, tokens) {
                    const match = src.match(/^\$((?:[^\$]|\\\$)+?)\$/);
                    if (match) {
                        return {
                            type: 'inlineMath',
                            raw: match[0],
                            text: match[0],
                            display: false
                        };
                    }
                    return false;
                },
                renderer(token) {
                    return token.text;
                }
            };

            // 【修正】块级公式扩展 (处理 \[...\])
            const blockMathBracketExtension = {
                name: 'blockMathBracket',
                level: 'block',
                start(src) {
                    // 匹配行首的 \[
                    const match = src.match(/^ {0,3}\\\[/m);
                    return match ? match.index : -1;
                },
                tokenizer(src, tokens) {
                    // 正确的正则：\\\ 匹配反斜杠，\[ 匹配 [
                    // 移除了多余的空格限制，支持 \[ 后直接跟公式
                    const rule = /^ {0,3}\\\[[\s\S]+?\\\](?:\n+|$)/;
                    const match = rule.exec(src);
                    if (match) {
                        return {
                            type: 'blockMathBracket',
                            raw: match[0],
                            text: match[0],
                            display: true
                        };
                    }
                    return false;
                },
                renderer(token) {
                    return token.text;
                }
            };

            // 【修正】行内公式扩展 (处理 \(...\))
            const inlineMathParenExtension = {
                name: 'inlineMathParen',
                level: 'inline',
                start(src) { return src.indexOf('\\('); },
                tokenizer(src, tokens) {
                    // 正确的正则：\\\ 匹配反斜杠，\( 匹配 (
                    const match = src.match(/^\\\(([\s\S]+?)\\\)/);
                    if (match) {
                        return {
                            type: 'inlineMathParen',
                            raw: match[0],
                            text: match[0],
                            display: false
                        };
                    }
                    return false;
                },
                renderer(token) {
                    return token.text;
                }
            };

            // 注册扩展
            marked.use({ extensions: [
                blockMathExtension,
                inlineMathExtension,
                blockMathBracketExtension,
                inlineMathParenExtension
            ]});

            // 3. 字体切换函数 (由 Qt 调用)
            function updateMathFont(fontName) {
                var link = document.getElementById('math-font-css');
                if (!link) return;
                var newHref = 'qrc:/resources/temml/Temml-' + fontName + '.css';
                if (link.getAttribute('href') !== newHref) {
                    link.setAttribute('href', newHref);
                }
            }

            // 4. 渲染函数
            function renderMarkdown(markdown) {
                var contentDiv = document.getElementById('content');
                var oldScrollTop = document.documentElement.scrollTop || document.body.scrollTop;

                if (!markdown) { contentDiv.innerHTML = ''; return; }

                try {
                    contentDiv.innerHTML = marked.parse(markdown);
                    if (typeof temml !== 'undefined') {
                        temml.renderMathInElement(contentDiv, {
                            delimiters: [
                                { left: '$$', right: '$$', display: true },
                                { left: '$', right: '$', display: false },
                                { left: '\\(', right: '\\)', display: false },
                                { left: '\\[', right: '\\]', display: true }
                            ],
                            trust: true, macros: {}
                        });
                    }
                } catch (e) {
                    console.error('Render Error:', e);
                    var errorMsg = document.createElement('div');
                    errorMsg.className = 'error';
                    errorMsg.innerHTML = 'Render Error: ' + e.message;
                    contentDiv.prepend(errorMsg);
                }
                window.scrollTo(0, oldScrollTop);
            }

            // 5. Qt WebChannel 初始化
            new QWebChannel(qt.webChannelTransport, function(channel) {
                window.bridge = channel.objects.bridge;

                // 连接 Markdown 变化信号
                bridge.markdownChanged.connect(renderMarkdown);

                // 连接字体变化信号
                bridge.mathFontChanged.connect(updateMathFont);

                // 初始渲染
                if (bridge.markdown) {
                    renderMarkdown(bridge.markdown);
                }

                // 初始字体应用
                if (bridge.mathFont) {
                    updateMathFont(bridge.mathFont);
                }
            });
        })();
    </script>
</body>
</html>
